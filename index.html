<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4C6EF5">
<title>学習継続トラッカー</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <h1>学習継続トラッカー</h1>
</header>

<main id="main">
  <section id="view-home" class="view"></section>
  <section id="view-calendar" class="view" hidden></section>
  <section id="view-stats" class="view" hidden></section>
  <section id="view-categories" class="view" hidden></section>
  <section id="view-settings" class="view" hidden></section>
</main>

<nav class="tab-nav">
  <button class="tab-btn" data-view="home" type="button">ホーム</button>
  <button class="tab-btn" data-view="calendar" type="button">カレンダー</button>
  <button class="tab-btn" data-view="stats" type="button">統計</button>
  <button class="tab-btn" data-view="categories" type="button">カテゴリ</button>
  <button class="tab-btn" data-view="settings" type="button">設定</button>
</nav>

<script src="js/db.js"></script>
<script src="js/streak.js"></script>
<script src="js/notify.js"></script>
<script src="js/home.js"></script>
<script src="js/calendar.js"></script>
<script src="js/stats.js"></script>
<script src="js/categories.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
